<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nonogram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --border: #dee2e6;
            --border-dark: #495057;
            --text: #212529;
            --text-muted: #6c757d;
            --filled: #212529;
            --marked: #e9ecef;
            --complete: #28a745;
            --hover: #f1f3f5;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 1rem;
            min-height: 100vh;
            touch-action: manipulation;
        }
        
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        h1 {
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        
        .subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        
        .controls {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
            align-items: center;
        }
        
        .btn {
            font-size: 0.875rem;
            padding: 0.5rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            cursor: pointer;
            transition: all 0.15s ease;
            font-weight: 500;
        }
        
        .btn:hover {
            background: var(--hover);
            border-color: var(--border-dark);
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .timer-section {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
        }
        
        .timer-display {
            font-size: 1rem;
            font-weight: 600;
            min-width: 60px;
            font-variant-numeric: tabular-nums;
        }
        
        .timer-controls {
            display: flex;
            gap: 0.5rem;
        }
        
        .timer-btn {
            font-size: 0.75rem;
            padding: 0.25rem 0.75rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-weight: 500;
        }
        
        .timer-btn:hover {
            background: var(--hover);
        }
        
        .puzzle-container {
            background: var(--surface);
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow: visible;
            max-width: 100%;
        }
        
        .grid-wrapper {
            display: flex;
            justify-content: center;
            width: 100%;
            overflow: visible;
        }
        
        .puzzle-grid {
            display: grid;
            gap: 0;
            touch-action: none;
            user-select: none;
            max-width: 100%;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 0.5rem;
            }
            
            h1 {
                font-size: 1.5rem;
            }
            
            .controls {
                gap: 0.5rem;
            }
            
            .btn {
                font-size: 0.75rem;
                padding: 0.4rem 0.8rem;
            }
            
            .timer-section {
                padding: 0.4rem 0.8rem;
            }
            
            .timer-display {
                font-size: 0.875rem;
                min-width: 50px;
            }
            
            .timer-btn {
                font-size: 0.7rem;
                padding: 0.2rem 0.6rem;
            }
            
            .puzzle-container {
                padding: 0.5rem;
            }
        }
        
        .puzzle-grid {
            display: grid;
            gap: 0;
            touch-action: none;
            user-select: none;
        }
        
        .clue-row, .clue-col {
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 0.25rem;
            color: var(--text-muted);
            gap: 0.25rem;
            font-variant-numeric: tabular-nums;
        }
        
        .clue-col {
            flex-direction: column;
            justify-content: flex-end;
        }
        
        .clue-number {
            font-weight: 500;
        }
        
        .clue-row.complete .clue-number,
        .clue-col.complete .clue-number {
            color: var(--complete);
        }
        
        .cell {
            width: 30px;
            height: 30px;
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            transition: background 0.1s ease;
            position: relative;
        }
        
        @media (max-width: 768px) {
            .cell {
                width: 20px;
                height: 20px;
            }
            .clue-row, .clue-col {
                font-size: 0.65rem;
            }
        }
        
        @media (max-width: 480px) {
            .cell {
                width: 16px;
                height: 16px;
            }
            .clue-row, .clue-col {
                font-size: 0.6rem;
                padding: 0.15rem;
                gap: 0.15rem;
            }
        }
        
        .cell:hover {
            background: var(--hover);
        }
        
        .cell.filled {
            background: var(--filled);
        }
        
        .cell.marked {
            background: var(--marked);
        }
        
        .cell.marked::after {
            content: '×';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.25rem;
            color: var(--text-muted);
            line-height: 1;
        }
        
        .cell.thick-border-right {
            border-right: 2px solid var(--border-dark);
        }
        
        .cell.thick-border-bottom {
            border-bottom: 2px solid var(--border-dark);
        }
        
        .size-selector {
            display: flex;
            gap: 0.5rem;
            justify-content: center;
            margin-bottom: 1rem;
        }
        
        .size-btn {
            font-size: 0.875rem;
            padding: 0.5rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-weight: 500;
        }
        
        .size-btn:hover {
            background: var(--hover);
        }
        
        .size-btn.active {
            background: var(--filled);
            color: var(--surface);
            border-color: var(--filled);
        }
        
        .completion-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--surface);
            border: 2px solid var(--complete);
            border-radius: 8px;
            padding: 2rem;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            z-index: 1000;
        }
        
        .completion-message.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: all;
        }
        
        .completion-message h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--complete);
        }
        
        .completion-message p {
            font-size: 0.875rem;
            color: var(--text-muted);
        }
        
        .instructions {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Nonogram</h1>
            <div class="subtitle">Picture Logic Puzzle</div>
        </header>
        
        <div class="size-selector" id="sizeSelector">
            <button class="size-btn active" data-size="5">5×5</button>
            <button class="size-btn" data-size="10">10×10</button>
            <button class="size-btn" data-size="15">15×15</button>
            <button class="size-btn" data-size="20">20×20</button>
        </div>
        
        <div class="instructions">Left-click to fill • Right-click/long-press to mark empty</div>
        
        <div class="controls">
            <button class="btn" id="clearBtn">Clear</button>
            <button class="btn" id="newPuzzle">New Puzzle</button>
            <div class="timer-section">
                <div class="timer-display" id="timerDisplay">00:00</div>
                <div class="timer-controls">
                    <button class="timer-btn" id="timerToggle">Start</button>
                    <button class="timer-btn" id="timerReset">Reset</button>
                </div>
            </div>
        </div>
        
        <div class="puzzle-container">
            <div class="grid-wrapper">
                <div class="puzzle-grid" id="puzzleGrid"></div>
            </div>
        </div>
    </div>
    
    <div class="completion-message" id="completionMessage">
        <h2>Puzzle Complete!</h2>
        <p id="completionTime"></p>
    </div>
    
    <script>
        class NonogramGame {
            constructor() {
                this.size = 5;
                this.solution = [];
                this.playerGrid = [];
                this.isDragging = false;
                this.dragMode = null;
                this.longPressTimer = null;
                this.isLongPress = false;
                
                // Timer properties
                this.timerRunning = false;
                this.timerSeconds = 0;
                this.timerInterval = null;
                this.puzzleCompleted = false;
                
                this.init();
                this.setupEventListeners();
                this.loadState();
            }
            
            init() {
                this.generatePuzzle();
                this.renderGrid();
            }
            
            generatePuzzle() {
                // Generate random solution
                this.solution = Array(this.size).fill(null).map(() => 
                    Array(this.size).fill(null).map(() => Math.random() > 0.6)
                );
                
                // Initialize player grid
                this.playerGrid = Array(this.size).fill(null).map(() => 
                    Array(this.size).fill('empty')
                );
                
                this.puzzleCompleted = false;
            }
            
            getClues(isRow, index) {
                const line = isRow ? 
                    this.solution[index] : 
                    this.solution.map(row => row[index]);
                
                const clues = [];
                let count = 0;
                
                for (let i = 0; i < line.length; i++) {
                    if (line[i]) {
                        count++;
                    } else if (count > 0) {
                        clues.push(count);
                        count = 0;
                    }
                }
                if (count > 0) clues.push(count);
                
                return clues.length > 0 ? clues : [0];
            }
            
            renderGrid() {
                const grid = document.getElementById('puzzleGrid');
                grid.innerHTML = '';
                
                const maxRowClueLength = Math.max(...Array(this.size).fill(0).map((_, i) => 
                    this.getClues(true, i).length
                ));
                const maxColClueLength = Math.max(...Array(this.size).fill(0).map((_, i) => 
                    this.getClues(false, i).length
                ));
                
                // Calculate cell size based on screen width and grid size
                const screenWidth = window.innerWidth;
                let cellSize;
                
                if (screenWidth <= 480) {
                    // Small phones
                    cellSize = Math.min(16, Math.floor((screenWidth - 80) / this.size));
                } else if (screenWidth <= 768) {
                    // Tablets and larger phones
                    cellSize = Math.min(20, Math.floor((screenWidth - 100) / this.size));
                } else {
                    // Desktop
                    if (this.size <= 10) {
                        cellSize = 30;
                    } else if (this.size <= 15) {
                        cellSize = 26;
                    } else {
                        cellSize = 22;
                    }
                }
                
                grid.style.gridTemplateColumns = `repeat(${maxRowClueLength}, auto) repeat(${this.size}, ${cellSize}px)`;
                grid.style.gridTemplateRows = `repeat(${maxColClueLength}, auto) repeat(${this.size}, ${cellSize}px)`;
                
                // Top-left corner spacer
                for (let i = 0; i < maxColClueLength * maxRowClueLength; i++) {
                    const spacer = document.createElement('div');
                    grid.appendChild(spacer);
                }
                
                // Column clues
                for (let col = 0; col < this.size; col++) {
                    const clues = this.getClues(false, col);
                    const clueDiv = document.createElement('div');
                    clueDiv.className = 'clue-col';
                    clueDiv.style.gridColumn = maxRowClueLength + col + 1;
                    clueDiv.style.gridRow = `1 / ${maxColClueLength + 1}`;
                    
                    clues.forEach(num => {
                        const span = document.createElement('span');
                        span.className = 'clue-number';
                        span.textContent = num;
                        clueDiv.appendChild(span);
                    });
                    
                    grid.appendChild(clueDiv);
                }
                
                // Grid rows
                for (let row = 0; row < this.size; row++) {
                    // Row clues
                    const clues = this.getClues(true, row);
                    const clueDiv = document.createElement('div');
                    clueDiv.className = 'clue-row';
                    clueDiv.style.gridColumn = `1 / ${maxRowClueLength + 1}`;
                    clueDiv.style.gridRow = maxColClueLength + row + 1;
                    
                    clues.forEach(num => {
                        const span = document.createElement('span');
                        span.className = 'clue-number';
                        span.textContent = num;
                        clueDiv.appendChild(span);
                    });
                    
                    grid.appendChild(clueDiv);
                    
                    // Cells
                    for (let col = 0; col < this.size; col++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.style.width = `${cellSize}px`;
                        cell.style.height = `${cellSize}px`;
                        cell.dataset.row = row;
                        cell.dataset.col = col;
                        
                        // Add thick borders every 5 cells
                        if ((col + 1) % 5 === 0 && col !== this.size - 1) {
                            cell.classList.add('thick-border-right');
                        }
                        if ((row + 1) % 5 === 0 && row !== this.size - 1) {
                            cell.classList.add('thick-border-bottom');
                        }
                        
                        this.updateCellDisplay(cell, row, col);
                        this.attachCellListeners(cell);
                        
                        grid.appendChild(cell);
                    }
                }
                
                this.updateClueCompletion();
            }
            
            updateCellDisplay(cell, row, col) {
                const state = this.playerGrid[row][col];
                cell.classList.remove('filled', 'marked');
                if (state === 'filled') {
                    cell.classList.add('filled');
                } else if (state === 'marked') {
                    cell.classList.add('marked');
                }
            }
            
            attachCellListeners(cell) {
                // Mouse events
                cell.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    this.handleCellInteraction(cell, e);
                    this.isDragging = true;
                });
                
                cell.addEventListener('mouseenter', (e) => {
                    if (this.isDragging && e.buttons === 1) {
                        this.handleCellInteraction(cell, e, true);
                    }
                });
                
                cell.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                });
                
                // Touch events with long-press detection
                let touchStartTime = 0;
                let touchMoved = false;
                let longPressTriggered = false;
                
                cell.addEventListener('touchstart', (e) => {
                    touchStartTime = Date.now();
                    touchMoved = false;
                    longPressTriggered = false;
                    this.isDragging = false;
                    
                    // Set up long-press detection
                    this.longPressTimer = setTimeout(() => {
                        if (!touchMoved) {
                            longPressTriggered = true;
                            // Visual feedback for long press
                            cell.style.opacity = '0.5';
                            setTimeout(() => { cell.style.opacity = '1'; }, 100);
                            
                            // Trigger mark action
                            const simulatedEvent = { button: 2 };
                            this.handleCellInteraction(cell, simulatedEvent);
                        }
                    }, 400); // 400ms for long press
                });
                
                cell.addEventListener('touchmove', (e) => {
                    const touch = e.touches[0];
                    const startTarget = e.target;
                    const currentTarget = document.elementFromPoint(touch.clientX, touch.clientY);
                    
                    // If we moved to a different cell, mark as moved
                    if (currentTarget !== startTarget) {
                        touchMoved = true;
                        clearTimeout(this.longPressTimer);
                    }
                });
                
                cell.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    clearTimeout(this.longPressTimer);
                    
                    const touchDuration = Date.now() - touchStartTime;
                    
                    // Only trigger tap if it wasn't a long press and didn't move
                    if (!longPressTriggered && !touchMoved && touchDuration < 400) {
                        // Short tap - fill action
                        const simulatedEvent = { button: 0 };
                        this.handleCellInteraction(cell, simulatedEvent);
                    }
                });
                
                cell.addEventListener('touchcancel', (e) => {
                    clearTimeout(this.longPressTimer);
                    touchMoved = true;
                });
            }
            
            handleCellInteraction(cell, event, isDrag = false) {
                const row = parseInt(cell.dataset.row);
                const col = parseInt(cell.dataset.col);
                const currentState = this.playerGrid[row][col];
                
                // Start timer on first interaction if not already running
                if (!this.timerRunning && !this.puzzleCompleted) {
                    this.startTimer();
                }
                
                let newState;
                
                if (!isDrag) {
                    // Initial click/touch
                    const isRightClick = event.button === 2;
                    
                    if (isRightClick) {
                        // Right-click toggles marked state
                        newState = currentState === 'marked' ? 'empty' : 'marked';
                    } else {
                        // Left-click toggles filled state
                        newState = currentState === 'filled' ? 'empty' : 'filled';
                    }
                    
                    this.dragMode = newState;
                } else {
                    // Dragging - apply the drag mode
                    newState = this.dragMode;
                }
                
                this.playerGrid[row][col] = newState;
                this.updateCellDisplay(cell, row, col);
                this.updateClueCompletion();
                this.checkCompletion();
                this.saveState();
            }
            
            updateClueCompletion() {
                const grid = document.getElementById('puzzleGrid');
                const clues = grid.querySelectorAll('.clue-row, .clue-col');
                
                clues.forEach(clue => {
                    clue.classList.remove('complete');
                });
                
                // Check row completion
                for (let row = 0; row < this.size; row++) {
                    if (this.isLineComplete(true, row)) {
                        const clueElements = grid.querySelectorAll('.clue-row');
                        clueElements[row]?.classList.add('complete');
                    }
                }
                
                // Check column completion
                for (let col = 0; col < this.size; col++) {
                    if (this.isLineComplete(false, col)) {
                        const clueElements = grid.querySelectorAll('.clue-col');
                        clueElements[col]?.classList.add('complete');
                    }
                }
            }
            
            isLineComplete(isRow, index) {
                const playerLine = isRow ?
                    this.playerGrid[index].map(cell => cell === 'filled') :
                    this.playerGrid.map(row => row[index] === 'filled');
                
                const solutionLine = isRow ?
                    this.solution[index] :
                    this.solution.map(row => row[index]);
                
                return JSON.stringify(playerLine) === JSON.stringify(solutionLine);
            }
            
            checkCompletion() {
                if (this.puzzleCompleted) return;
                
                let isComplete = true;
                for (let row = 0; row < this.size; row++) {
                    for (let col = 0; col < this.size; col++) {
                        const playerFilled = this.playerGrid[row][col] === 'filled';
                        const solutionFilled = this.solution[row][col];
                        if (playerFilled !== solutionFilled) {
                            isComplete = false;
                            break;
                        }
                    }
                    if (!isComplete) break;
                }
                
                if (isComplete) {
                    this.puzzleCompleted = true;
                    this.stopTimer();
                    this.showCompletion();
                }
            }
            
            showCompletion() {
                const message = document.getElementById('completionMessage');
                const timeText = document.getElementById('completionTime');
                timeText.textContent = `Time: ${this.formatTime(this.timerSeconds)}`;
                message.classList.add('show');
                
                setTimeout(() => {
                    message.classList.remove('show');
                }, 3000);
            }
            
            clearGrid() {
                this.playerGrid = Array(this.size).fill(null).map(() => 
                    Array(this.size).fill('empty')
                );
                this.puzzleCompleted = false;
                this.renderGrid();
                this.resetTimer();
                this.saveState();
            }
            
            newPuzzle() {
                this.generatePuzzle();
                this.renderGrid();
                this.resetTimer();
                this.saveState();
            }
            
            // Timer methods
            startTimer() {
                if (this.timerRunning) return;
                this.timerRunning = true;
                document.getElementById('timerToggle').textContent = 'Pause';
                
                this.timerInterval = setInterval(() => {
                    this.timerSeconds++;
                    this.updateTimerDisplay();
                    this.saveState();
                }, 1000);
            }
            
            stopTimer() {
                if (!this.timerRunning) return;
                this.timerRunning = false;
                document.getElementById('timerToggle').textContent = 'Start';
                clearInterval(this.timerInterval);
            }
            
            resetTimer() {
                this.stopTimer();
                this.timerSeconds = 0;
                this.updateTimerDisplay();
                this.saveState();
            }
            
            toggleTimer() {
                if (this.timerRunning) {
                    this.stopTimer();
                } else {
                    this.startTimer();
                }
            }
            
            updateTimerDisplay() {
                document.getElementById('timerDisplay').textContent = this.formatTime(this.timerSeconds);
            }
            
            formatTime(seconds) {
                const mins = Math.floor(seconds / 60);
                const secs = seconds % 60;
                return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
            
            changeSize(newSize) {
                this.size = newSize;
                this.newPuzzle();
            }
            
            saveState() {
                const state = {
                    size: this.size,
                    solution: this.solution,
                    playerGrid: this.playerGrid,
                    timerSeconds: this.timerSeconds,
                    timerRunning: this.timerRunning,
                    puzzleCompleted: this.puzzleCompleted
                };
                localStorage.setItem('nonogramState', JSON.stringify(state));
            }
            
            loadState() {
                const saved = localStorage.getItem('nonogramState');
                if (saved) {
                    try {
                        const state = JSON.parse(saved);
                        this.size = state.size;
                        this.solution = state.solution;
                        this.playerGrid = state.playerGrid;
                        this.timerSeconds = state.timerSeconds || 0;
                        this.puzzleCompleted = state.puzzleCompleted || false;
                        
                        this.renderGrid();
                        this.updateTimerDisplay();
                        
                        // Update size selector
                        document.querySelectorAll('.size-btn').forEach(btn => {
                            btn.classList.toggle('active', parseInt(btn.dataset.size) === this.size);
                        });
                    } catch (e) {
                        console.error('Failed to load state:', e);
                    }
                }
            }
            
            setupEventListeners() {
                // Stop dragging on mouse up anywhere
                document.addEventListener('mouseup', () => {
                    this.isDragging = false;
                    this.dragMode = null;
                });
                
                // Resize handler for orientation changes
                let resizeTimeout;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimeout);
                    resizeTimeout = setTimeout(() => {
                        this.renderGrid();
                    }, 250);
                });
                
                // Controls
                document.getElementById('clearBtn').addEventListener('click', () => this.clearGrid());
                document.getElementById('newPuzzle').addEventListener('click', () => this.newPuzzle());
                
                // Timer controls
                document.getElementById('timerToggle').addEventListener('click', () => this.toggleTimer());
                document.getElementById('timerReset').addEventListener('click', () => this.resetTimer());
                
                // Size selector
                document.querySelectorAll('.size-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const size = parseInt(btn.dataset.size);
                        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        this.changeSize(size);
                    });
                });
            }
        }
        
        // Initialize game
        const game = new NonogramGame();
    </script>
</body>
</html>
